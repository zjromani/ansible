# Register user-scoped Claude Code MCP servers
# Requires ~/.zshenv_private to have NOTION_API_KEY set
- name: Check if user-scoped krisp MCP is already registered
  shell: |
    export NVM_DIR="$HOME/.nvm"
    [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
    claude mcp list 2>/dev/null | grep -q '^krisp:'
  args:
    executable: /bin/zsh
  register: krisp_mcp_check
  failed_when: false
  changed_when: false
  tags: claude-mcp

- name: Register Claude MCP servers via setup script
  shell: |
    export NVM_DIR="$HOME/.nvm"
    [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
    bash {{ ansible_env.HOME }}/.claude/setup-mcps.sh
  args:
    executable: /bin/zsh
  when: krisp_mcp_check.rc != 0
  tags: claude-mcp
