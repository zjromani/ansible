- name: Create ~/claude directory
  file:
    path: "{{ ansible_env.HOME }}/claude"
    state: directory
    mode: '0755'
  tags: snowflake

- name: Symlink run_query.py from zach-ai-workspace
  file:
    src: "{{ ansible_env.HOME }}/flights/zach-ai-workspace/scripts/run_query.py"
    dest: "{{ ansible_env.HOME }}/claude/run_query.py"
    state: link
  tags: snowflake

- name: Create Snowflake venv
  shell: python3 -m venv {{ ansible_env.HOME }}/claude/venv
  args:
    creates: "{{ ansible_env.HOME }}/claude/venv"
  tags: snowflake

- name: Install snowflake-connector-python
  shell: "{{ ansible_env.HOME }}/claude/venv/bin/pip install snowflake-connector-python"
  args:
    creates: "{{ ansible_env.HOME }}/claude/venv/lib/python3.13/site-packages/snowflake"
  tags: snowflake
